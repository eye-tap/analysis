cohorts:
  cohort1:
    file: data/cohort1.csv
    preset: basic
    label: Baseline
  cohort2:
    file: data/cohort2.csv
    preset: nopreannotations
    label: Keybinds+Visuals
  cohort3:
    file: data/cohort3.csv
